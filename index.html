<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Priority OS — Score what matters, decide what's next</title>
    <meta name="description" content="A decision-support tool. Score items once, evaluate them through multiple lenses, and get clear priorities and recommendations." />
    <meta name="author" content="Priority OS" />

    <meta property="og:title" content="Priority OS" />
    <meta property="og:description" content="Score items once, evaluate them through multiple lenses, get clear priorities." />
    <meta property="og:type" content="website" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,300;1,9..144,400&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <script>
      (function () {
        try {
          var v = localStorage.getItem('priority-os.theme');
          var dark = v === 'dark' || (!v && window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (dark) document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
